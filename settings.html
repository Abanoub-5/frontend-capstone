<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Profile</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>Settings</h1>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="settings.html" class="nav-link active">Settings</a>
      </nav>
    </header>

    <main class="main">
      <section class="settings-section">
        <h2>Profile Information</h2>
        <form id="profile-form" class="profile-form" novalidate>
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              required
              minlength="3"
              maxlength="20"
              pattern="[a-zA-Z0-9_]+"
            />
            <span class="error-message" id="username-error"></span>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
            <span class="error-message" id="email-error"></span>
          </div>

          <div class="form-group">
            <label for="display-name">Display Name</label>
            <input
              type="text"
              id="display-name"
              name="displayName"
              maxlength="50"
            />
            <span class="error-message" id="display-name-error"></span>
          </div>

          <div class="form-group">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" rows="4" maxlength="200"></textarea>
            <span class="char-count" id="bio-count">0/200</span>
          </div>

          <div class="form-group">
            <label for="avatar">Avatar URL</label>
            <input
              type="url"
              id="avatar"
              name="avatar"
              placeholder="https://example.com/avatar.png"
            />
            <span class="error-message" id="avatar-error"></span>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <button type="button" class="btn btn-secondary" id="reset-btn">
              Reset
            </button>
          </div>
        </form>
      </section>

      <section class="settings-section">
        <h2>Account Settings</h2>
        <form id="account-form" class="account-form" novalidate>
          <div class="form-group">
            <label for="current-password">Current Password</label>
            <input
              type="password"
              id="current-password"
              name="currentPassword"
            />
            <span class="error-message" id="current-password-error"></span>
          </div>

          <div class="form-group">
            <label for="new-password">New Password</label>
            <input
              type="password"
              id="new-password"
              name="newPassword"
              minlength="8"
              pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}"
            />
            <span class="error-message" id="new-password-error"></span>
            <p class="hint">
              Minimum 8 characters, at least one uppercase, lowercase, and
              number
            </p>
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm New Password</label>
            <input
              type="password"
              id="confirm-password"
              name="confirmPassword"
            />
            <span class="error-message" id="confirm-password-error"></span>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">
              Update Password
            </button>
          </div>
        </form>
      </section>

      <section class="settings-section">
        <h2>Notifications</h2>
        <form id="notifications-form" class="notifications-form">
          <div class="toggle-group">
            <label class="toggle-label">
              <span>Email Notifications</span>
              <input
                type="checkbox"
                id="email-notifications"
                name="emailNotifications"
                checked
              />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="toggle-group">
            <label class="toggle-label">
              <span>Push Notifications</span>
              <input
                type="checkbox"
                id="push-notifications"
                name="pushNotifications"
                checked
              />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="toggle-group">
            <label class="toggle-label">
              <span>Weekly Digest</span>
              <input type="checkbox" id="weekly-digest" name="weeklyDigest" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">
              Save Preferences
            </button>
          </div>
        </form>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2024 Frontend Capstone. Built with AI-assisted development.</p>
    </footer>

    <div id="toast" class="toast" role="alert" aria-live="polite"></div>

    <script src="settings.js"></script>
  </body>
</html>
